spring.application.name=ecom-stock
spring.main.web-application-type=reactive
spring.r2dbc.url=r2dbc:h2:mem:///ecom-stock
spring.r2dbc.username=sa
spring.r2dbc.password=

jasypt.encryptor.password=${ENCRYPTION_KEY}
jasypt.encryptor.algorithm=PBEWithHMACSHA512AndAES_256
jasypt.encryptor.iv-generator-classname=org.jasypt.iv.RandomIvGenerator
jasypt.encryptor.key-obtention-iterations=1000

springdoc.swagger-ui.path=/apispec.html
springdoc.swagger-ui.url=/apispec.yaml
springdoc.api-docs.enabled=true


spring.flyway.enabled=true
spring.flyway.url=jdbc:h2:mem:ecom-member;MODE=MySQL
spring.flyway.user=${spring.r2dbc.username}
spring.flyway.password=${spring.r2dbc.password}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

spring.messages.encoding=UTF-8

