name: Spring Boot CI/CD to K3s

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: current

    steps:
      # 현재 리포지토리 폴더에 체크아웃
      - name: Checkout Current
        uses: actions/checkout@v4
        with:
          path: current

      # 공통 모듈 리포지토리(ecom-common) 폴더에 체크아웃
      - name: Checkout Common
        uses: actions/checkout@v4
        with:
          repository: NG-Archive/ecom-common
          path: ecom-common
          # token: ${{ secrets.GH_TOKEN }}

      # 자바 21 세팅
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # gradle 세팅
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # gradle 빌드
      - name: Build with Gradle
        run: ./gradlew clean build --stacktrace

      # tailscale 연결
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          args: --exit-node=${{secrets.TS_EXIT_NODE_IP}}

      # 레지스트리 insecure 등록
      - name: Configure Docker for Insecure Registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{ "insecure-registries": ["${{ secrets.REGISTRY_URL }}"] }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      # Docker Login
      - name: Log in to Private Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker 이미지 빌드 및 온프레미스 레지스트리 푸시
      - name: Build and Push Docker Image
        run: |
          APP_NAME=ecom/stock-api
          IMAGE_TAG=latest
          docker build -f Dockerfile.prod -t ${{ secrets.REGISTRY_URL }}/$APP_NAME:$IMAGE_TAG .
          docker push ${{ secrets.REGISTRY_URL }}/$APP_NAME:$IMAGE_TAG

      # 3. K3s 접속 설정
      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_64 }}" | base64 -d > ~/.kube/config

      # 4. K3s에 배포
      - name: Deploy to K3s
        run: |
          kubectl rollout restart deployment/ecom-stock-api
          kubectl rollout status deployment/ecom-stock-api --timeout=180s